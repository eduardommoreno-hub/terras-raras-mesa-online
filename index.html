<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Terras Raras — Mesa Online</title><style>
:root{--bg:#080502;--panel:#15100b;--panel2:#21190f;--gold:#d0a94a;--gold2:#f1cf78;--muted:#a99874;--txt:#f1e6d2;--red:#d24e3a;--green:#58b36a;--blue:#5c8fe8;--line:#3b2c18}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#21140a,#050301 65%);color:var(--txt);font-family:Georgia,'Times New Roman',serif;min-height:100vh}button,input,textarea,select{font:inherit}button{cursor:pointer}.hidden{display:none!important}.app{min-height:100vh}.screen{display:none;min-height:100vh}.screen.on{display:block}.center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}.card{width:min(480px,100%);background:rgba(18,12,7,.92);border:1px solid var(--line);border-radius:18px;box-shadow:0 20px 80px #000;padding:28px}.logo{font-size:54px;line-height:.9;letter-spacing:.12em;color:var(--gold);font-weight:bold}.tag{color:var(--muted);letter-spacing:.18em;text-transform:uppercase;font-size:13px;margin:14px 0 24px}.tabs{display:flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:18px}.tabs button{flex:1;padding:12px;background:#0c0805;color:var(--muted);border:0}.tabs button.on{background:var(--panel2);color:var(--gold)}label{display:block;color:var(--muted);font-size:12px;letter-spacing:.12em;text-transform:uppercase;margin:12px 0 6px}input,textarea,select{width:100%;background:#0c0805;border:1px solid var(--line);border-radius:10px;color:var(--txt);padding:12px;outline:none}textarea{min-height:92px;resize:vertical}.btn{border:1px solid var(--gold);background:linear-gradient(135deg,#5f4516,#9b7629);color:#ffe6a0;border-radius:10px;padding:12px 14px;letter-spacing:.1em;text-transform:uppercase;font-size:12px}.btn.small{padding:8px 10px;font-size:11px}.btn.ghost{background:transparent;border-color:var(--line);color:var(--muted)}.btn.danger{border-color:var(--red);color:#ffc7bd}.msg{margin-top:12px;color:var(--gold2);font-size:14px}.err{color:#ff8c7b}.top{height:64px;display:flex;align-items:center;gap:12px;padding:0 18px;border-bottom:1px solid var(--line);background:rgba(14,10,6,.95);position:sticky;top:0;z-index:5}.brand{font-weight:bold;color:var(--gold);letter-spacing:.16em}.grow{flex:1}.pill{border:1px solid var(--line);border-radius:999px;padding:6px 10px;color:var(--muted);font-size:13px}.hub{padding:22px;display:grid;grid-template-columns:1fr 360px;gap:18px}.box{background:rgba(18,12,7,.88);border:1px solid var(--line);border-radius:16px;padding:18px}.title{color:var(--gold);font-size:20px;letter-spacing:.08em;margin:0 0 12px}.rooms{display:grid;gap:10px}.room{border:1px solid var(--line);background:var(--panel);border-radius:12px;padding:14px;display:flex;align-items:center;gap:12px}.room:hover{border-color:var(--gold)}.room b{color:var(--gold2)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}.char{border:1px solid var(--line);background:var(--panel);border-radius:14px;overflow:hidden}.char .art{height:110px;display:flex;align-items:center;justify-content:center;background:#070403}.char svg{width:100%;height:100%}.char .pad{padding:12px}.char b{color:var(--gold2)}.game{height:calc(100vh - 64px);display:grid;grid-template-columns:1fr 360px;overflow:hidden}.mapArea{position:relative;background:#030201;overflow:hidden}.mapSvg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}.mapShade{position:absolute;inset:0;background:radial-gradient(circle at center,transparent 25%,rgba(0,0,0,.28) 80%);pointer-events:none}.token{position:absolute;transform:translate(-50%,-50%);width:58px;height:58px;border-radius:50%;border:3px solid var(--gold);box-shadow:0 0 18px #000,0 0 18px rgba(208,169,74,.55);background:#111;display:flex;align-items:center;justify-content:center;touch-action:none;user-select:none}.token svg{width:100%;height:100%;border-radius:50%}.tokenName{position:absolute;top:61px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);border:1px solid var(--line);border-radius:999px;padding:3px 8px;font-size:12px;white-space:nowrap;color:#fff}.side{background:rgba(13,9,5,.97);border-left:1px solid var(--line);overflow:auto}.sideSection{padding:14px;border-bottom:1px solid var(--line)}.row{display:flex;gap:8px;align-items:center}.row>*{flex:1}.players{display:grid;gap:8px}.player{border:1px solid var(--line);background:var(--panel);border-radius:12px;padding:10px}.meter{height:8px;background:#090604;border:1px solid var(--line);border-radius:20px;overflow:hidden;margin-top:4px}.fill{height:100%;background:var(--green)}.fill.energy{background:var(--blue)}.chat{display:flex;flex-direction:column;gap:8px;max-height:220px;overflow:auto}.bubble{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px;font-size:14px}.bubble b{color:var(--gold2)}.notes{display:grid;gap:8px;max-height:220px;overflow:auto}.note{background:#100b07;border-left:3px solid var(--gold);padding:10px;border-radius:8px;font-size:14px}.adminList{display:grid;gap:8px}.pending{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:12px;padding:10px;background:var(--panel)}@media(max-width:900px){.hub{grid-template-columns:1fr}.game{grid-template-columns:1fr}.side{position:fixed;right:0;top:64px;bottom:0;width:min(92vw,380px);z-index:10}.side.closed{display:none}.token{width:48px;height:48px}.logo{font-size:42px}}
</style></head><body><div class="app">
<section id="login" class="screen on"><div class="center"><div class="card"><div class="logo">TERRAS<br>RARAS</div><div class="tag">Mesa online · RPG de sobrevivência</div><div class="tabs"><button id="tabLogin" class="on" onclick="mode='login';drawAuth()">Entrar</button><button id="tabReg" onclick="mode='reg';drawAuth()">Solicitar cadastro</button></div><div id="authBody"></div><div id="authMsg" class="msg"></div></div></div></section>
<section id="hub" class="screen"><div class="top"><div class="brand">TERRAS RARAS</div><span id="userPill" class="pill"></span><div class="grow"></div><button class="btn small ghost" onclick="logout()">Sair</button></div><div class="hub"><div class="box"><h2 class="title">Minhas mesas</h2><div id="rooms" class="rooms"></div><h2 class="title" style="margin-top:22px">Personagens disponíveis</h2><div id="chars" class="grid"></div></div><div class="box"><h2 class="title">Criar mesa</h2><label>Nome da campanha</label><input id="roomName" value="Terras Raras — Sessão 1"><button class="btn" style="margin-top:10px" onclick="createRoom()">Criar sala</button><h2 class="title" style="margin-top:22px">Entrar com código</h2><label>Código</label><input id="joinCode" placeholder="SALA-XXXX" style="text-transform:uppercase"><button class="btn" style="margin-top:10px" onclick="joinRoom()">Entrar</button><div id="adminBox" class="hidden"><h2 class="title" style="margin-top:22px">Autorizar cadastros</h2><div id="pending" class="adminList"></div></div></div></div></section>
<section id="game" class="screen"><div class="top"><button class="btn small ghost" onclick="show('hub');loadHub()">← Hub</button><div class="brand" id="gameTitle">Mesa</div><span class="pill" id="roomCode"></span><div class="grow"></div><button class="btn small ghost" onclick="toggleSide()">Painel</button></div><div class="game"><div id="mapArea" class="mapArea"><div id="mapSvg" class="mapSvg"></div><div class="mapShade"></div><div id="tokens"></div></div><aside id="side" class="side"><div class="sideSection"><h3 class="title" id="mapName">Mapa</h3><p id="mapDesc" style="color:var(--muted)"></p><div id="masterMapControls" class="hidden"><label>Mudar zona/mapa</label><select id="mapSelect"></select><button class="btn small" style="margin-top:8px" onclick="changeMap()">Alterar mapa</button></div></div><div class="sideSection"><h3 class="title">Jogadoras</h3><div id="players" class="players"></div></div><div class="sideSection"><h3 class="title">Escolher personagem</h3><select id="charSelect"></select><button class="btn small" style="margin-top:8px" onclick="chooseChar()">Usar personagem</button></div><div class="sideSection"><h3 class="title">Chat</h3><div id="chat" class="chat"></div><div class="row" style="margin-top:8px"><input id="chatText" placeholder="Mensagem..."><button class="btn small" onclick="sendChat()">Enviar</button></div></div><div class="sideSection"><h3 class="title">Diário da Mestre</h3><div id="notes" class="notes"></div><div id="masterNotes" class="hidden"><label>Título</label><input id="noteTitle" value="Resumo da sessão"><label>Texto</label><textarea id="noteText" placeholder="Eventos importantes, fraquezas, itens, localização, pendências..."></textarea><button class="btn small" style="margin-top:8px" onclick="addNote()">Salvar nota</button></div></div></aside></div></section>
</div><script>
const API=location.origin;let token=localStorage.tr_token||'';let me=null;let mode='login';let state=null;let currentRoom=null;let ws=null;let dragging=null;
function qs(id){return document.getElementById(id)}function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));qs(id).classList.add('on')}function msg(t,err=false){qs('authMsg').textContent=t;qs('authMsg').className='msg '+(err?'err':'')}async function api(path,opts={}){opts.headers=Object.assign({'Content-Type':'application/json'},opts.headers||{});if(token)opts.headers.Authorization='Bearer '+token;let r=await fetch(API+path,opts);let txt=await r.text();let data=txt?JSON.parse(txt):{};if(!r.ok)throw new Error(data.detail||'Erro');return data}
function drawAuth(){qs('tabLogin').classList.toggle('on',mode==='login');qs('tabReg').classList.toggle('on',mode==='reg');qs('authBody').innerHTML=mode==='login'?`<label>Usuário</label><input id="u" autocomplete="username"><label>Senha</label><input id="p" type="password" autocomplete="current-password"><button class="btn" style="margin-top:14px" onclick="login()">Entrar</button>`:`<label>Nome da jogadora</label><input id="u" autocomplete="username"><label>Senha</label><input id="p" type="password"><button class="btn" style="margin-top:14px" onclick="register()">Pedir autorização</button>`;msg('')}
async function login(){try{let d=await api('/auth/login',{method:'POST',body:JSON.stringify({username:qs('u').value,password:qs('p').value})});token=d.token;localStorage.tr_token=token;me=d.user;await loadHub()}catch(e){msg(e.message,true)}}
async function register(){try{let d=await api('/auth/register',{method:'POST',body:JSON.stringify({username:qs('u').value,password:qs('p').value})});msg(d.message)}catch(e){msg(e.message,true)}}
function logout(){localStorage.removeItem('tr_token');token='';me=null;show('login');drawAuth()}async function boot(){drawAuth();if(token){try{me=await api('/me');await loadHub()}catch(e){logout()}}}
async function loadHub(){show('hub');if(!me)me=await api('/me');qs('userPill').textContent=me.username+(me.is_admin?' · admin':'');let [rooms,chars]=await Promise.all([api('/rooms/mine'),api('/characters')]);qs('rooms').innerHTML=rooms.length?rooms.map(r=>`<div class="room"><div class="grow"><b>${esc(r.name)}</b><br><span class="pill">${r.code}</span> <span style="color:var(--muted)">${r.role}</span></div><button class="btn small" onclick="openRoom('${r.id}')">Abrir</button></div>`).join(''):'<p style="color:var(--muted)">Nenhuma mesa ainda.</p>';qs('chars').innerHTML=chars.map(c=>`<div class="char"><div class="art">${c.avatar_svg}</div><div class="pad"><b>${c.name}</b><br><span style="color:var(--muted)">${c.role} · ${c.zone}</span><p>${c.description}</p></div></div>`).join('');if(me.is_admin){qs('adminBox').classList.remove('hidden');loadPending()}else qs('adminBox').classList.add('hidden')}
async function loadPending(){let p=await api('/admin/pending');qs('pending').innerHTML=p.length?p.map(u=>`<div class="pending"><b class="grow">${esc(u.username)}</b><button class="btn small" onclick="approve(${u.id})">Autorizar</button></div>`).join(''):'<p style="color:var(--muted)">Nenhum cadastro pendente.</p>'}async function approve(id){await api('/admin/approve/'+id,{method:'POST'});loadPending()}
async function createRoom(){let r=await api('/rooms/create',{method:'POST',body:JSON.stringify({name:qs('roomName').value})});openRoom(r.id)}async function joinRoom(){let r=await api('/rooms/join',{method:'POST',body:JSON.stringify({code:qs('joinCode').value})});openRoom(r.id)}
async function openRoom(id){currentRoom=id;state=await api('/rooms/'+id);show('game');connectWS();renderGame()}function connectWS(){if(ws)ws.close();let proto=location.protocol==='https:'?'wss':'ws';ws=new WebSocket(`${proto}://${location.host}/ws/${currentRoom}`);ws.onmessage=e=>{let d=JSON.parse(e.data);if(d.type==='state'){state=d.state;renderGame()}}}
function renderGame(){let r=state.room,m=state.map;qs('gameTitle').textContent=r.name;qs('roomCode').textContent=r.code;qs('mapSvg').innerHTML=m.image_svg;qs('mapName').textContent=m.name;qs('mapDesc').textContent=m.description;let isMaster=state.me&&state.me.role==='mestre'||me&&me.is_admin;qs('masterMapControls').classList.toggle('hidden',!isMaster);qs('masterNotes').classList.toggle('hidden',!isMaster);qs('mapSelect').innerHTML=state.maps.map(x=>`<option value="${x.id}" ${x.id===m.id?'selected':''}>${x.zone_number}. ${x.name}</option>`).join('');qs('charSelect').innerHTML=(window._charsHTML||'');loadCharSelect();renderTokens(isMaster);renderPlayers(isMaster);renderChat();renderNotes()}
async function loadCharSelect(){if(window._loadedChars)return;let chars=await api('/characters');window._loadedChars=true;window._charsHTML=chars.map(c=>`<option value="${c.id}">${c.name} — ${c.role}</option>`).join('');qs('charSelect').innerHTML=window._charsHTML}
function renderTokens(isMaster){qs('tokens').innerHTML=state.players.map(p=>`<div class="token" data-id="${p.id}" style="left:${p.x}%;top:${p.y}%" onpointerdown="startDrag(event,${p.id},${isMaster||isMe(p)})">${p.character?p.character.avatar_svg:'<b>?</b>'}<div class="tokenName">${esc(p.character?p.character.name:p.username)}</div></div>`).join('')}function isMe(p){return p.username===me.username}
function startDrag(ev,pid,can){if(!can)return;dragging={pid};ev.currentTarget.setPointerCapture(ev.pointerId)}qs('mapArea').addEventListener('pointermove',ev=>{if(!dragging)return;let rect=qs('mapArea').getBoundingClientRect();let x=(ev.clientX-rect.left)/rect.width*100,y=(ev.clientY-rect.top)/rect.height*100;let el=document.querySelector(`.token[data-id="${dragging.pid}"]`);if(el){el.style.left=Math.max(0,Math.min(100,x))+'%';el.style.top=Math.max(0,Math.min(100,y))+'%'}});qs('mapArea').addEventListener('pointerup',async ev=>{if(!dragging)return;let rect=qs('mapArea').getBoundingClientRect();let x=(ev.clientX-rect.left)/rect.width*100,y=(ev.clientY-rect.top)/rect.height*100;let pid=dragging.pid;dragging=null;await api(`/rooms/${currentRoom}/move-token`,{method:'POST',body:JSON.stringify({player_id:pid,x,y})})});
function renderPlayers(isMaster){qs('players').innerHTML=state.players.map(p=>`<div class="player"><b>${esc(p.username)}</b> <span style="color:var(--muted)">${p.role}</span><br><span style="color:var(--gold2)">${p.character?p.character.name:'sem personagem'}</span><div>Vida ${p.hp}<div class="meter"><div class="fill" style="width:${p.hp}%"></div></div></div><div>Energia ${p.energy}<div class="meter"><div class="fill energy" style="width:${p.energy}%"></div></div></div>${isMaster?`<div class="row" style="margin-top:8px"><input id="hp${p.id}" value="${p.hp}"><input id="en${p.id}" value="${p.energy}"><button class="btn small" onclick="saveStats(${p.id})">OK</button></div><label>Fraqueza/obs.</label><textarea id="nt${p.id}">${esc(p.notes||p.weakness||'')}</textarea><button class="btn small ghost" onclick="saveNotes(${p.id})">Salvar obs.</button>`:''}</div>`).join('')}
async function saveStats(pid){await api(`/rooms/${currentRoom}/stats`,{method:'POST',body:JSON.stringify({player_id:pid,hp:+qs('hp'+pid).value,energy:+qs('en'+pid).value})})}async function saveNotes(pid){await api(`/rooms/${currentRoom}/stats`,{method:'POST',body:JSON.stringify({player_id:pid,notes:qs('nt'+pid).value})})}
async function chooseChar(){await api(`/rooms/${currentRoom}/choose-character`,{method:'POST',body:JSON.stringify({room_id:currentRoom,character_id:qs('charSelect').value})})}async function changeMap(){await api(`/rooms/${currentRoom}/map`,{method:'POST',body:JSON.stringify({map_id:qs('mapSelect').value})})}
function renderChat(){qs('chat').innerHTML=state.chat.map(c=>`<div class="bubble"><b>${esc(c.username)}</b><br>${esc(c.text)}</div>`).join('');qs('chat').scrollTop=99999}async function sendChat(){let t=qs('chatText').value.trim();if(!t)return;qs('chatText').value='';await api(`/rooms/${currentRoom}/chat`,{method:'POST',body:JSON.stringify({text:t})})}
function renderNotes(){qs('notes').innerHTML=state.notes.map(n=>`<div class="note"><b>${esc(n.title)}</b><br>${esc(n.text).replace(/\n/g,'<br>')}</div>`).join('')}async function addNote(){await api(`/rooms/${currentRoom}/notes`,{method:'POST',body:JSON.stringify({title:qs('noteTitle').value,text:qs('noteText').value})});qs('noteText').value=''}function toggleSide(){qs('side').classList.toggle('closed')}function esc(s){return (s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
boot();
</script></body></html>
